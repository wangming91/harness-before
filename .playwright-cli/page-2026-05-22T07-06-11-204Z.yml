        - paragraph [ref=e316]:
          - text: 需要承认一个限制：
          - strong [ref=e317]: 这意味着这套方法论的有效性依赖于团队中存在能定义 attractor 的人
          - text: 。这不是方法论的弱点，而是它正确识别的事实——架构判断是稀缺资源。传统协作中，这种判断可以部分留在架构师脑中，靠口传心授和 code review 传递；AI 没有跨 session 记忆，任何未被显式外化的架构判断对 AI 都不存在。这套方法论的工程贡献正是把这种稀缺资源
